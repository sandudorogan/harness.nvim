name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true

      - name: Setup StyLua
        run: |
          curl -LSfs https://github.com/JohnnyMorganz/StyLua/releases/latest/download/stylua-linux-x86_64.zip -o /tmp/stylua.zip
          unzip -o /tmp/stylua.zip -d /usr/local/bin
          chmod +x /usr/local/bin/stylua

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run static checks
        run: bun run check

      - name: Run Bun tests
        run: bun test

      - name: Run Neovim smoke test
        run: bun run test:nvim
